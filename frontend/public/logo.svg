<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2AABEE"/>
      <stop offset="100%" stop-color="#0D6FA8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>
  <!-- shield outline -->
  <path d="M256 80 L400 140 V280 C400 370 256 432 256 432 S112 370 112 280 V140 Z"
    fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
  <!-- telegram paper plane (centered in shield) -->
  <g transform="translate(256,248) scale(5.5)">
    <path d="M-18.6-8.9l2 9.3c.1.7.5.8 1.1.5l3-2.2 1.4 1.4c.2.2.3.3.6.3l-.2-3.1-5.6-5c-.2-.2.1-.3.4-.1l6.9 4.3 3-.9c.6-.2.7-.6-.1-1L-18.6-8.9z"
      fill="white"/>
  </g>
  <!-- lock keyhole at bottom of shield -->
  <circle cx="256" cy="340" r="14" fill="rgba(255,255,255,0.35)"/>
  <rect x="250" y="340" width="12" height="20" rx="2" fill="rgba(255,255,255,0.35)"/>
</svg>
